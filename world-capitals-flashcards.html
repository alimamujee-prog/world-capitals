<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>World Capitals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light dark;
    --bg:#FBFBFA;
    --card:#FFFFFF;
    --ink:#1B1B19;
    --soft:#6B6B66;
    --faint:#9A9A93;
    --cyan:#04CCBA;
    --cyan-deep:#018577;
    --coral:#D9544A;
    --line:#EAEAE5;
    --line-2:#DCDCD5;
    --r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;
  }
  .wrap{max-width:720px;margin:0 auto;padding:26px 18px 90px}

  /* Header */
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:500}
  h1{font-family:'Libre Baskerville',serif;font-weight:700;font-size:clamp(28px,7vw,40px);margin:2px 0 0;letter-spacing:-.01em}
  .sub{color:var(--soft);font-size:13.5px;margin-top:8px;max-width:560px}

  /* Tabs */
  .tabs{display:flex;gap:26px;margin:24px 0 0;border-bottom:1px solid var(--line)}
  .tabs button{appearance:none;border:none;background:none;font:inherit;font-size:15px;font-weight:500;color:var(--faint);padding:0 0 12px;cursor:pointer;position:relative;transition:color .15s}
  .tabs button:hover{color:var(--soft)}
  .tabs button[aria-selected="true"]{color:var(--ink)}
  .tabs button[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--cyan)}
  .tabs button:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:3px}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:20px 0 6px}
  .field{position:relative;display:inline-flex;align-items:center}
  .field label{position:absolute;left:14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);top:-7px;background:var(--bg);padding:0 4px}
  select,input[type="search"]{font:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line-2);border-radius:10px;padding:11px 14px}
  select{cursor:pointer;padding-right:30px}
  select:focus,input:focus{outline:none;border-color:var(--cyan)}
  .linkbtn{appearance:none;background:none;border:none;font:inherit;font-size:13.5px;font-weight:500;color:var(--cyan-deep);cursor:pointer;padding:8px 4px}
  .linkbtn:hover{text-decoration:underline}
  .linkbtn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px}

  .count{margin:14px 2px 16px;font-size:12.5px;color:var(--faint);letter-spacing:.02em}
  .count b{color:var(--soft);font-weight:600}

  /* ---------- FLASHCARD ---------- */
  .stage{perspective:1800px}
  .card{position:relative;width:100%;min-height:330px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 26px}
  .face .tl{position:absolute;top:16px;left:18px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .face .tr{position:absolute;top:16px;right:18px;font-size:11px;color:var(--faint)}
  .flag{font-size:50px;line-height:1;margin-bottom:16px}
  .country{font-family:'Libre Baskerville',serif;font-size:clamp(26px,7vw,40px);font-weight:700;line-height:1.08;letter-spacing:-.01em}
  .say{margin-top:10px;font-size:14px;color:var(--soft);font-style:italic}
  .say b{font-style:normal;font-weight:600;color:var(--ink)}
  .hint{margin-top:22px;font-size:12px;color:var(--faint)}
  .hint kbd{font-family:inherit;font-size:11px;border:1px solid var(--line-2);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--soft)}

  .back{transform:rotateY(180deg)}
  .clabel{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan-deep);margin-bottom:10px}
  .capital{font-family:'Libre Baskerville',serif;font-size:clamp(23px,6vw,34px);font-weight:700;line-height:1.12}
  .note{margin-top:18px;max-width:430px;font-size:12.5px;line-height:1.5;color:var(--soft);border-top:1px solid var(--line);padding-top:14px}
  .hear{margin-top:20px;display:inline-flex;align-items:center;gap:7px;background:none;color:var(--cyan-deep);border:1px solid var(--line-2);font:inherit;font-weight:500;font-size:13px;padding:8px 15px;border-radius:999px;cursor:pointer;transition:.15s}
  .hear:hover{border-color:var(--cyan)}
  .hear:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:20px}
  .nav button{flex:1;font:inherit;font-weight:500;font-size:14px;background:var(--card);border:1px solid var(--line-2);border-radius:11px;padding:13px 14px;cursor:pointer;color:var(--ink);transition:.15s}
  .nav button:hover:not(:disabled){border-color:var(--cyan)}
  .nav button:disabled{color:var(--faint);cursor:default}
  .nav button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .bar{height:3px;background:var(--line);border-radius:999px;overflow:hidden;margin:18px 2px 0}
  .bar i{display:block;height:100%;background:var(--cyan);width:0;transition:width .35s}

  /* ---------- QUIZ ---------- */
  .quiz{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:30px 24px}
  .qflag{font-size:40px;text-align:center;line-height:1;margin-bottom:8px}
  .qp{text-align:center;color:var(--faint);font-size:12px;letter-spacing:.1em;text-transform:uppercase}
  .qc{text-align:center;font-family:'Libre Baskerville',serif;font-size:clamp(24px,6vw,34px);font-weight:700;margin:6px 0 4px}
  .qsay{text-align:center;font-size:13px;color:var(--soft);font-style:italic;margin-bottom:22px}
  .opts{display:grid;gap:10px}
  .opt{font:inherit;font-size:15px;font-weight:500;text-align:left;background:var(--card);border:1px solid var(--line-2);border-radius:12px;padding:15px 17px;cursor:pointer;color:var(--ink);transition:.12s;display:flex;align-items:center;gap:13px}
  .opt:hover:not(:disabled){border-color:var(--cyan)}
  .opt:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .opt .k{font-size:12px;color:var(--faint);border:1px solid var(--line-2);border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex:none}
  .opt.correct{border-color:var(--cyan);background:#F2FCFB}
  .opt.correct .k{border-color:var(--cyan);color:var(--cyan-deep)}
  .opt.wrong{border-color:var(--coral);background:#FCF3F2}
  .opt.wrong .k{border-color:var(--coral);color:var(--coral)}
  .opt:disabled{cursor:default}
  .fb{min-height:22px;text-align:center;margin-top:18px;font-size:14px;font-weight:500}
  .fb .ph{font-weight:400;font-style:italic;color:var(--soft)}
  .qnextwrap{display:flex;justify-content:center;margin-top:14px}
  .qnext{font:inherit;font-weight:500;font-size:14px;background:var(--card);border:1px solid var(--cyan);color:var(--cyan-deep);border-radius:11px;padding:12px 28px;cursor:pointer}
  .qnext:hover{background:#F2FCFB}
  .qnext:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .chips{display:flex;gap:16px;justify-content:center;margin-top:18px;font-size:12.5px;color:var(--faint)}
  .chips b{color:var(--ink);font-weight:600}
  .chips .g b{color:var(--cyan-deep)}
  .chips .w b{color:var(--coral)}

  .done{text-align:center;padding:46px 16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r)}
  .done h2{font-family:'Libre Baskerville',serif;font-size:38px;margin:0 0 6px}
  .done p{color:var(--soft);margin:0 0 22px;font-size:14px}
  .done .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .done button{font:inherit;font-weight:500;font-size:14px;border-radius:11px;padding:12px 22px;cursor:pointer;border:1px solid var(--line-2);background:var(--card);color:var(--ink)}
  .done button.key{border-color:var(--cyan);color:var(--cyan-deep)}
  .done button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  /* ---------- LIST ---------- */
  .list{margin-top:4px}
  .group{margin-top:22px}
  .group:first-child{margin-top:6px}
  .group h3{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:700;color:var(--cyan-deep);margin:0 0 4px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .row-item{display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .row-item .l{min-width:0}
  .row-item .cn{font-size:15px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
  .row-item .cn .fl{font-size:16px}
  .row-item .cp{font-size:12px;color:var(--faint);font-style:italic;margin-top:1px}
  .row-item .rt{text-align:right;flex:none}
  .row-item .ca{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:400;color:var(--ink)}
  .row-item .pp{font-size:12px;color:var(--faint);font-style:italic;margin-top:1px}
  .empty{color:var(--faint);text-align:center;padding:40px;font-size:14px}

  .foot{margin-top:38px;font-size:12px;line-height:1.6;color:var(--soft);border-top:1px solid var(--line);padding-top:16px}
  .foot b{color:var(--ink)}

  @media (prefers-color-scheme:dark){
    :root{
      --bg:#161719;
      --card:#202125;
      --ink:#EDEDEB;
      --soft:#B2B2AC;
      --faint:#86867F;
      --cyan:#04CCBA;
      --cyan-deep:#41DDCE;
      --coral:#FF7066;
      --line:#2E2F34;
      --line-2:#3C3D43;
    }
    .opt.correct{background:rgba(4,204,186,.14)}
    .opt.wrong{background:rgba(255,112,102,.14)}
    .qnext:hover{background:rgba(4,204,186,.12)}
    .done button.key:hover{background:rgba(4,204,186,.12)}
  }
  @media (max-width:480px){
    .tabs{gap:18px}
    .toolbar{gap:8px}
  }
  @media (prefers-reduced-motion:reduce){.card{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="eyebrow">Talent-show prep · current to June 2026</span>
    <h1>World Capitals</h1>
    <p class="sub" id="sub"></p>
  </header>

  <div class="tabs" role="tablist">
    <button id="t-cards" role="tab" aria-selected="true">Flashcards</button>
    <button id="t-quiz" role="tab" aria-selected="false">Quiz</button>
    <button id="t-list" role="tab" aria-selected="false">List</button>
  </div>

  <div class="toolbar">
    <div class="field">
      <label for="region">Continent</label>
      <select id="region" aria-label="Filter by continent"></select>
    </div>
    <div class="field" id="searchField" style="display:none">
      <label for="search">Find</label>
      <input type="search" id="search" placeholder="country or capital">
    </div>
    <button class="linkbtn" id="shuffle">Shuffle</button>
  </div>

  <div class="count" id="count"></div>
  <main id="app"></main>
  <div class="foot" id="foot"></div>
</div>

/* =========================================================
   STATE
   ========================================================= */
const $=s=>document.querySelector(s);
const app=$('#app');
let tab='cards';
let region='All';
let search='';
let deck=[];
let idx=0,flipped=false;
let got=0,missed=0,missedList=[];

const CONTINENTS=['All','Africa','Asia','Europe','North America','South America','Oceania','Bonus'];

function buildRegionSelect(){
  $('#region').innerHTML=CONTINENTS
    .filter(r=>r==='All'||DATA.some(d=>d.r===r))
    .map(r=>{const n=r==='All'?DATA.length:DATA.filter(d=>d.r===r).length;return `<option value="${r}">${r} · ${n}</option>`;})
    .join('');
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function filtered(){return region==='All'?DATA.slice():DATA.filter(d=>d.r===region);}
function buildDeck(doShuffle){deck=filtered();if(doShuffle)deck=shuffle(deck);idx=0;flipped=false;got=0;missed=0;missedList=[];}
function speak(t){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.rate=.85;speechSynthesis.speak(u);}
function clean(s){return s.replace(/\s*\(.*?\)/g,'').trim();}

/* =========================================================
   RENDER
   ========================================================= */
function setTabUI(){
  $('#t-cards').setAttribute('aria-selected',tab==='cards');
  $('#t-quiz').setAttribute('aria-selected',tab==='quiz');
  $('#t-list').setAttribute('aria-selected',tab==='list');
  $('#searchField').style.display=tab==='list'?'inline-flex':'none';
  $('#shuffle').style.display=tab==='list'?'none':'inline-block';
}
function setCount(){
  const c=$('#count');
  if(tab==='list'){const n=listData().length;c.innerHTML=`<b>${n}</b> ${n===1?'country':'countries'}${region==='All'?'':' in '+region}`;}
  else c.innerHTML=`<b>${Math.min(idx+1,deck.length)}</b> of ${deck.length}${region==='All'?'':' · '+region}`;
}
function render(){setTabUI();setCount();if(tab==='cards')renderCards();else if(tab==='quiz')renderQuiz();else renderList();}

/* ---- FLASHCARDS ---- */
function renderCards(){
  if(!deck.length){app.innerHTML='<div class="empty">No countries in this continent.</div>';return;}
  const d=deck[idx];const pct=((idx+1)/deck.length)*100;
  app.innerHTML=`
    <div class="stage">
      <div class="card ${flipped?'flipped':''}" id="card" tabindex="0" role="button" aria-label="Flashcard, activate to flip">
        <div class="face front">
          <span class="tl">${d.r}</span><span class="tr">${idx+1}/${deck.length}</span>
          <div class="flag">${d.f}</div>
          <div class="country">${d.c}</div>
          <div class="say"><b>${d.cp}</b></div>
          <button class="hear" id="hearC">Hear country</button>
          <div class="hint">Tap to reveal capital · <kbd>space</kbd></div>
        </div>
        <div class="face back">
          <span class="tl">${d.c}</span>
          <div class="clabel">Capital</div>
          <div class="capital">${d.cap}</div>
          <div class="say"><b>${d.p}</b></div>
          ${d.n?`<div class="note">${d.n}</div>`:''}
          <button class="hear" id="hearCap">Hear capital</button>
        </div>
      </div>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="nav">
      <button id="prev" ${idx===0?'disabled':''}>← Back</button>
      <button id="flip">Flip card</button>
      <button id="next" ${idx===deck.length-1?'disabled':''}>Next →</button>
    </div>`;
  const card=$('#card');
  const doFlip=()=>{flipped=!flipped;card.classList.toggle('flipped');};
  card.addEventListener('click',e=>{if(!e.target.classList.contains('hear'))doFlip();});
  card.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();doFlip();}});
  $('#flip').addEventListener('click',doFlip);
  $('#prev').addEventListener('click',prev);
  $('#next').addEventListener('click',next);
  $('#hearC').addEventListener('click',e=>{e.stopPropagation();speak(clean(d.c));});
  $('#hearCap').addEventListener('click',e=>{e.stopPropagation();speak(clean(d.cap));});
}
function next(){if(idx<deck.length-1){idx++;flipped=false;render();}}
function prev(){if(idx>0){idx--;flipped=false;render();}}

/* ---- QUIZ ---- */
function distractorPool(){return DATA.filter(d=>!d.cap.includes('('));}
function options(correct){
  const pool=distractorPool().filter(d=>d.cap!==correct.cap);
  return shuffle([correct.cap,...shuffle(pool).slice(0,3).map(d=>d.cap)]);
}
function renderQuiz(){
  if(!deck.length){app.innerHTML='<div class="empty">No countries in this continent.</div>';return;}
  if(idx>=deck.length){renderDone();return;}
  const d=deck[idx];const opts=options(d);const pct=((idx+1)/deck.length)*100;
  app.innerHTML=`
    <div class="quiz">
      <div class="qflag">${d.f}</div>
      <div class="qp">Capital of</div>
      <div class="qc">${d.c}</div>
      <div class="qsay">${d.cp}</div>
      <div class="opts" id="opts">
        ${opts.map((o,i)=>`<button class="opt" data-cap="${encodeURIComponent(o)}"><span class="k">${i+1}</span><span>${o}</span></button>`).join('')}
      </div>
      <div class="fb" id="fb"></div>
      <div class="qnextwrap" id="nx"></div>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="chips"><span class="g">Correct <b>${got}</b></span><span class="w">Review <b>${missed}</b></span></div>`;
  const bs=Array.from(document.querySelectorAll('.opt'));
  bs.forEach(b=>b.addEventListener('click',()=>answer(b,d,bs)));
}
function answer(btn,d,bs){
  const chosen=decodeURIComponent(btn.dataset.cap);
  bs.forEach(b=>{b.disabled=true;const cap=decodeURIComponent(b.dataset.cap);if(cap===d.cap)b.classList.add('correct');else if(b===btn)b.classList.add('wrong');});
  const fb=$('#fb');
  if(chosen===d.cap){got++;fb.innerHTML=`Correct. <span class="ph">${d.cap} · ${d.p}</span>`;fb.style.color='var(--cyan-deep)';}
  else{missed++;missedList.push(d);fb.innerHTML=`It's <b>${d.cap}</b>. <span class="ph">${d.p}</span>`;fb.style.color='var(--coral)';}
  $('#nx').innerHTML=`<button class="qnext" id="qn">Next →</button>`;
  $('#qn').addEventListener('click',()=>{idx++;render();});
  $('#qn').focus();
}
function renderDone(){
  const total=got+missed;const score=total?Math.round(got/total*100):0;
  app.innerHTML=`
    <div class="done">
      <h2>${score}%</h2>
      <p>${got} correct · ${missed} to review · ${total} cards</p>
      <div class="row">
        ${missedList.length?`<button class="key" id="drill">Drill the ${missedList.length} you missed</button>`:''}
        <button id="again">Restart deck</button>
      </div>
    </div>`;
  if(missedList.length)$('#drill').addEventListener('click',()=>{deck=shuffle(missedList);idx=0;got=0;missed=0;missedList=[];render();});
  $('#again').addEventListener('click',()=>{buildDeck(true);render();});
}

/* ---- LIST (alphabetical by country) ---- */
function listData(){
  let rows=filtered().slice().sort((a,b)=>a.c.localeCompare(b.c));
  if(search){const q=search.toLowerCase();rows=rows.filter(d=>d.c.toLowerCase().includes(q)||d.cap.toLowerCase().includes(q));}
  return rows;
}
function renderList(){
  const rows=listData();
  if(!rows.length){app.innerHTML='<div class="empty">Nothing matches.</div>';return;}
  let html='<div class="list">';let letter='';
  rows.forEach(d=>{
    const L=d.c[0].toUpperCase();
    if(L!==letter){if(letter!=='')html+='</div>';letter=L;html+=`<div class="group"><h3>${L}</h3>`;}
    html+=`
      <div class="row-item">
        <div class="l">
          <div class="cn"><span class="fl">${d.f}</span>${d.c}</div>
        </div>
        <div class="rt">
          <div class="ca">${d.cap}</div>
        </div>
      </div>`;
  });
  html+='</div></div>';
  app.innerHTML=html;
}

/* =========================================================
   WIRING
   ========================================================= */
function setTab(t){tab=t;if(t!=='list')buildDeck(t==='quiz');render();}
$('#t-cards').addEventListener('click',()=>setTab('cards'));
$('#t-quiz').addEventListener('click',()=>setTab('quiz'));
$('#t-list').addEventListener('click',()=>setTab('list'));
$('#region').addEventListener('change',e=>{region=e.target.value;if(tab!=='list')buildDeck(tab==='quiz');render();});
$('#shuffle').addEventListener('click',()=>{buildDeck(true);render();});
$('#search').addEventListener('input',e=>{search=e.target.value;render();});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;
  if(tab==='cards'){if(e.key==='ArrowRight')next();else if(e.key==='ArrowLeft')prev();}
  if(tab==='quiz'&&['1','2','3','4'].includes(e.key)){const b=document.querySelectorAll('.opt')[+e.key-1];if(b&&!b.disabled)b.click();}
});

/* init */
buildRegionSelect();
$('#sub').textContent='193 UN members plus Vatican City, Palestine, Kosovo and Taiwan, with a bonus tier of territories. '+DATA.length+' cards, each with country and capital pronunciations.';
$('#foot').innerHTML='<b>The count:</b> 193 UN member states, plus Vatican City and Palestine (UN observers), Kosovo and Taiwan (widely recognized), and a Bonus tier of territories that are not sovereign countries. <b>Stage watch-outs:</b> South Africa has three capitals; Bolivia, Sri Lanka, Eswatini, Benin, Côte d\'Ivoire, the Netherlands and Tanzania split functions across cities; Indonesia is moving to Nusantara but Jakarta is still correct today; Kazakhstan switched back to Astana in 2022. <b>Pronunciation:</b> respellings are an English-speaker\'s approximation (capitals show the stressed syllable). The Hear buttons use your device voice, which is convenient but imperfect on names like Ouagadougou, so trust the respelling first.';
buildDeck(false);
render();
</script>
